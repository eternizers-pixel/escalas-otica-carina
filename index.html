<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escalas · Ótica Carina</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👓</text></svg>" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f6fb; --card:#ffffff; --ink:#1f2a44; --muted:#6b7790; --line:#e6eaf2;
  --brand:#3b6cf6; --brand-d:#2c54c9; --brand-soft:#eaf0ff;
  --green:#16a34a; --green-soft:#e7f7ec; --amber:#d98a00; --amber-soft:#fff4e0;
  --red:#dc2626; --red-soft:#fdeaea; --purple:#7c3aed; --purple-soft:#f1ebfe;
  --radius:14px; --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px;line-height:1.5}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---- Login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eaf0ff,#f4f6fb)}
.login-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:34px 30px;width:360px;max-width:92vw}
.login-card h1{font-size:20px;margin:6px 0 2px}
.login-card .sub{color:var(--muted);margin:0 0 20px;font-size:13px}
.brandmark{font-size:30px}

/* ---- Shell ---- */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:230px;background:#101a33;color:#c7d2e8;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar .logo{padding:18px 20px;font-weight:700;color:#fff;font-size:16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.07)}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav a{display:flex;align-items:center;gap:10px;color:#aeb9d4;padding:9px 12px;border-radius:9px;font-size:13.5px;margin:1px 0}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:var(--brand);color:#fff}
.nav .ico{width:18px;text-align:center}
.sidebar .foot{padding:12px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:#8493b4}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar h2{margin:0;font-size:17px}
.userbox{display:flex;align-items:center;gap:12px;font-size:13px}
.badge{padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.gestor{background:var(--green-soft);color:var(--green)}
.badge.viewer{background:var(--brand-soft);color:var(--brand-d)}
.badge.sim{background:var(--purple-soft);color:var(--purple)}
.content{padding:22px;max-width:1200px;width:100%}

/* ---- Components ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card h3{margin:0 0 4px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.kpi{font-size:26px;font-weight:700}
.kpi small{font-size:13px;color:var(--muted);font-weight:500}
.section{margin-top:22px}
.section h3.t{font-size:15px;margin:0 0 12px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel .ph{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.panel .ph h3{margin:0;font-size:15px}
.panel .pb{padding:16px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;text-transform:uppercase;letter-spacing:.02em}
td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.btn{background:var(--brand);color:#fff;border:none;padding:9px 15px;border-radius:9px;font-size:13.5px;font-weight:600}
.btn:hover{background:var(--brand-d)}
.btn.sec{background:#eef1f8;color:var(--ink)}
.btn.sec:hover{background:#e2e7f2}
.btn.ghost{background:transparent;color:var(--brand);padding:6px 10px}
.btn.danger{background:var(--red)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 5px;font-weight:600}
.field{margin-bottom:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.ativa{background:var(--green-soft);color:var(--green)}
.pill.ferias{background:var(--amber-soft);color:var(--amber)}
.pill.licenca,.pill.afastada{background:var(--red-soft);color:var(--red)}
.pill.desligada{background:#eef1f8;color:var(--muted)}
.alert{display:flex;gap:10px;padding:11px 14px;border-radius:11px;margin-bottom:10px;font-size:13.5px;align-items:flex-start}
.alert.warn{background:var(--amber-soft);color:#7a4d00}
.alert.err{background:var(--red-soft);color:#8a1c1c}
.alert.ok{background:var(--green-soft);color:#0f5d2c}
.alert.info{background:var(--brand-soft);color:var(--brand-d)}
.muted{color:var(--muted)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.spacer{flex:1}
.reason{background:#f8faff;border-left:3px solid var(--brand);padding:8px 11px;border-radius:0 8px 8px 0;font-size:12.5px;color:#36507e;margin-top:6px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(16,26,51,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:#fff;border-radius:16px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .mh h3{margin:0;font-size:16px}
.modal .mb{padding:20px}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.x{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer}

/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-size:11px;color:var(--muted);text-align:center;font-weight:700;text-transform:uppercase;padding:4px}
.cal .day{background:#fff;border:1px solid var(--line);border-radius:9px;min-height:78px;padding:5px;font-size:11px}
.cal .day .dn{font-weight:700;color:var(--muted);font-size:12px}
.cal .day.out{background:#fafbfe;opacity:.5}
.cal .day.sat{background:#fbf7ff}
.cal .ev{display:block;border-radius:5px;padding:1px 5px;margin-top:3px;font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev.folga{background:var(--green-soft);color:var(--green)}
.ev.sug{background:var(--brand-soft);color:var(--brand-d)}
.ev.fer{background:var(--amber-soft);color:var(--amber)}
.ev.sab{background:var(--purple-soft);color:var(--purple)}
.ev.blk{background:var(--red-soft);color:var(--red)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}

.fair{display:inline-flex;align-items:center;gap:7px;font-weight:700}
.fair .ball{width:13px;height:13px;border-radius:50%}
.toast{position:fixed;bottom:22px;right:22px;background:#101a33;color:#fff;padding:12px 18px;border-radius:11px;box-shadow:var(--shadow);z-index:99;font-size:13.5px;opacity:0;transform:translateY(10px);transition:.25s}
.toast.show{opacity:1;transform:none}
.simbanner{background:var(--purple);color:#fff;text-align:center;padding:6px;font-size:12.5px;font-weight:600}
@media(max-width:820px){
  .sidebar{position:fixed;left:-240px;z-index:40;transition:.25s}
  .sidebar.open{left:0}
  .grid2,.grid3{grid-template-columns:1fr}
  .menu-btn{display:inline-block!important}
}
.menu-btn{display:none;background:none;border:none;font-size:22px;margin-right:8px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="brandmark">👓</div>
    <h1>Escalas · Ótica Carina</h1>
    <p class="sub">Gestão de folgas, banco de horas e rodízio</p>
    <div id="loginErr"></div>
    <div class="field"><label>E-mail</label><input id="liEmail" type="email" placeholder="seu@email.com" autocomplete="username"/></div>
    <div class="field"><label>Senha</label><input id="liPass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" style="width:100%" id="liBtn">Entrar</button>
    <p class="sub" style="text-align:center;margin:16px 0 0">
      Primeiro acesso? <a href="#" id="liSignup">Criar conta</a>
    </p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="logo">👓 Ótica Carina</div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">
        <div id="footUser"></div>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center">
          <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="userbox">
          <span id="simToggleWrap"></span>
          <span id="uEmail" class="muted"></span>
          <span id="uRole"></span>
          <button class="btn sec sm" id="logoutBtn">Sair</button>
        </div>
      </div>
      <div id="simBanner"></div>
      <div class="content" id="view"></div>
    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="./config.js"></script>
<script src="./engine.js"></script>
<script src="./app.js"></script>
</body>
</html>
