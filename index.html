<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escalas · Ótica Carina</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<meta name="theme-color" content="#3D6DF5" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg1:#eef2fb; --bg2:#f7f9fd; --card:#ffffff; --ink:#1f2a44; --muted:#6b7790; --line:#e6eaf2;
  --brand:#3b6cf6; --brand-d:#2c54c9; --brand-soft:#eaf0ff;
  --green:#16a34a; --green-soft:#e7f7ec; --amber:#d98a00; --amber-soft:#fff4e0;
  --red:#dc2626; --red-soft:#fdeaea; --purple:#7c3aed; --purple-soft:#f1ebfe;
  --teal:#0d9488; --teal-soft:#d9f3ef; --pink:#db2777; --pink-soft:#fbe4f0;
  --radius:16px; --shadow:0 1px 3px rgba(20,30,60,.05),0 10px 30px rgba(20,30,60,.07);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2) 60%);color:var(--ink);font-size:14.5px;line-height:1.5;min-height:100vh}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---- Login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:36px 32px;width:370px;max-width:92vw;text-align:center}
.login-card h1{font-size:21px;margin:8px 0 2px}
.login-card .sub{color:var(--muted);margin:0 0 22px;font-size:13px}
.brandmark{font-size:34px}
.brandlogo{max-width:200px;width:72%;height:auto;display:block;margin:0 auto 10px}
.login-card .field{text-align:left}

/* ---- App shell ---- */
#app{display:none;min-height:100vh}
.apphead{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;max-width:1180px;margin:0 auto;width:100%}
.head-left{display:flex;align-items:center;gap:14px;min-width:0}
.backbtn{background:#fff;border:1px solid var(--line);color:var(--ink);padding:8px 14px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow)}
.backbtn:hover{background:#f3f6fc}
.pagetitle{font-size:18px;font-weight:700}
.head-right{display:flex;align-items:center;gap:12px;font-size:13.5px;color:var(--muted);flex-wrap:wrap;justify-content:flex-end}
.head-right b{color:var(--ink)}
.linkbtn{background:none;border:none;color:var(--brand);font-weight:600;display:inline-flex;align-items:center;gap:5px;font-size:13.5px}
.badge{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.gestor{background:var(--green-soft);color:var(--green)}
.badge.viewer{background:var(--brand-soft);color:var(--brand-d)}
.content{padding:8px 26px 40px;max-width:1180px;margin:0 auto;width:100%}

/* ---- Home hero + cards ---- */
.hero{text-align:center;padding:18px 0 30px}
.hero .logo{font-size:30px;font-weight:800;letter-spacing:.02em}
.hero .logo .em{font-size:34px;vertical-align:middle}
.hero .home-logo{max-width:240px;width:62%;height:auto;display:block;margin:0 auto}
.hero .tag{color:var(--muted);margin-top:10px;font-size:18px;font-weight:600}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:18px}
.home-grid.cols3{grid-template-columns:repeat(3,1fr)}
.home-grid.cols4{grid-template-columns:repeat(4,1fr)}
.home-grid + .home-grid{margin-top:18px}
@media(max-width:780px){.home-grid.cols3,.home-grid.cols4{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.home-grid.cols3,.home-grid.cols4{grid-template-columns:1fr}}
.hcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;align-items:center}
.hcard:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(20,30,60,.10),0 16px 40px rgba(20,30,60,.10)}
.hcard .ic{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px}
.hcard h3{margin:0 0 6px;font-size:17px}
.hcard p{margin:0;color:var(--muted);font-size:12.8px;line-height:1.45}
.ic.b{background:var(--brand-soft)} .ic.g{background:var(--green-soft)} .ic.a{background:var(--amber-soft)}
.ic.p{background:var(--purple-soft)} .ic.t{background:var(--teal-soft)} .ic.k{background:var(--pink-soft)} .ic.r{background:var(--red-soft)}

/* ---- Components ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card h3{margin:0 0 4px;font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.kpi{font-size:26px;font-weight:700}
.kpi small{font-size:13px;color:var(--muted);font-weight:500}
.section{margin-top:22px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel .ph{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel .ph h3{margin:0;font-size:15px}
.panel .pb{padding:16px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);font-size:11.5px;text-transform:uppercase;letter-spacing:.02em}
td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.btn{background:var(--brand);color:#fff;border:none;padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:600}
.btn:hover{background:var(--brand-d)}
.btn.sec{background:#eef1f8;color:var(--ink)}
.btn.sec:hover{background:#e2e7f2}
.btn.ghost{background:transparent;color:var(--brand);padding:6px 10px}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
input[type=checkbox],input[type=radio]{width:auto;padding:0;margin:0;border:0;border-radius:0;flex:0 0 auto}
input[type=date],input[type=time]{-webkit-appearance:none;appearance:none;min-width:0}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 5px;font-weight:600}
.field{margin-bottom:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:13px}
.masonry{columns:2;column-gap:13px}
.masonry>.panel{break-inside:avoid;margin:0 0 13px;width:100%;display:inline-block}
@media(max-width:820px){.masonry{columns:1}}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
/* área da funcionária — visual de app de celular */
.fnc{max-width:460px;margin:0 auto;width:100%}
.fnc .panel{border-radius:16px}
.fnc .panel+.panel,.fnc .panel.section{margin-top:12px}
.fnc-hi{padding:8px 4px 4px}
.fnc-hi h2{margin:0;font-size:22px;line-height:1.2}
.fnc-hi p{margin:5px 0 0;color:var(--muted);font-size:14px}
.fnc .kpi{font-size:30px}
.fnc .btn{border-radius:12px}
.fnc .chip-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fnc .chk-chip{width:100%;border-radius:12px;justify-content:flex-start}
/* notificações (gestor) */
.notif-bell{position:relative;background:none;border:0;cursor:pointer;font-size:19px;line-height:1;padding:4px 6px}
.notif-badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.notif-overlay{position:fixed;inset:0;background:rgba(15,23,42,.32);opacity:0;visibility:hidden;transition:.2s;z-index:60}
.notif-overlay.open{opacity:1;visibility:visible}
.notif-drawer{position:fixed;top:0;right:0;height:100%;width:350px;max-width:88vw;background:#fff;box-shadow:-10px 0 36px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .25s ease;z-index:61;display:flex;flex-direction:column}
.notif-drawer.open{transform:translateX(0)}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);font-size:16px}
.notif-body{overflow-y:auto;padding:12px;flex:1}
.notif-item{display:flex;gap:10px;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.notif-item.warn{background:#fff7e6;border-color:#ffe0a3}
.notif-item .btn{flex:none}
.chk-chip{position:relative;display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1.6px solid var(--line);border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;color:#5b6577;background:#fff;user-select:none;transition:background .12s,border-color .12s}
.chk-chip input{position:absolute;opacity:0;pointer-events:none;margin:0}
.chk-chip::before{content:"";width:16px;height:16px;border:1.6px solid #c2cbd9;border-radius:5px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;flex:none}
.chk-chip:has(input:checked){border-color:var(--brand);background:var(--brand-soft);color:var(--brand-d)}
.chk-chip:has(input:checked)::before{content:"✓";background:var(--brand);border-color:var(--brand)}
.chk-chip:has(input:disabled){opacity:.5;cursor:default}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.ativa{background:var(--green-soft);color:var(--green)}
.pill.ferias{background:var(--amber-soft);color:var(--amber)}
.pill.licenca,.pill.afastada{background:var(--red-soft);color:var(--red)}
.pill.desligada{background:#eef1f8;color:var(--muted)}
.alert{display:flex;gap:10px;padding:11px 14px;border-radius:12px;margin-bottom:10px;font-size:13.5px;align-items:flex-start}
.alert.warn{background:var(--amber-soft);color:#7a4d00}
.alert.err{background:var(--red-soft);color:#8a1c1c}
.alert.ok{background:var(--green-soft);color:#0f5d2c}
.alert.info{background:var(--brand-soft);color:var(--brand-d)}
.muted{color:var(--muted)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.spacer{flex:1}
.reason{background:#f8faff;border-left:3px solid var(--brand);padding:8px 11px;border-radius:0 8px 8px 0;font-size:12.5px;color:#36507e;margin-top:6px}
.modal-bg{position:fixed;inset:0;background:rgba(16,26,51,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:#fff;border-radius:16px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .mh h3{margin:0;font-size:16px}
.modal .mb{padding:20px}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.x{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-size:11px;color:var(--muted);text-align:center;font-weight:700;text-transform:uppercase;padding:4px}
.cal .day{background:#fff;border:1px solid var(--line);border-radius:9px;height:122px;padding:6px;font-size:11px;overflow-y:auto}
.cal .day .dn{font-weight:700;color:var(--muted);font-size:12px}
.cal .day.out{background:#fafbfe;opacity:.5}
.cal .day.sat{background:#fbf7ff}
.ev{display:block;border-radius:6px;padding:4px 9px;margin-top:5px;font-size:12.5px;font-weight:600;white-space:normal;line-height:1.3;word-break:break-word}
.ev .evt{display:block;font-size:14px;font-weight:800;margin-top:1px}
.cal .ev{font-size:10.5px;padding:3px 6px;margin-top:4px}
.cal .ev .evt{font-size:13px}
.ev.folga{background:var(--green-soft);color:var(--green)}
.ev.sug{background:var(--brand-soft);color:var(--brand-d)}
.ev.fer{background:var(--amber-soft);color:var(--amber)}
.ev.sab{background:var(--purple-soft);color:var(--purple)}
.ev.blk{background:var(--red-soft);color:var(--red)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.fair{display:inline-flex;align-items:center;gap:7px;font-weight:700}
.fair .ball{width:13px;height:13px;border-radius:50%}
.toast{position:fixed;bottom:22px;right:22px;background:#101a33;color:#fff;padding:12px 18px;border-radius:11px;box-shadow:var(--shadow);z-index:99;font-size:13.5px;opacity:0;transform:translateY(10px);transition:.25s}
.toast.show{opacity:1;transform:none}
.simbanner{background:var(--purple);color:#fff;text-align:center;padding:7px;font-size:12.5px;font-weight:600;border-radius:12px;margin:0 26px}
@media(max-width:680px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
@media(max-width:640px){
  body{font-size:14px}
  .content{padding:8px 10px 30px}
  .apphead{padding:10px 10px;gap:6px;flex-wrap:wrap}
  .head-right{font-size:12px;gap:8px}
  .pagetitle{font-size:16px}
  .backbtn{padding:7px 11px;font-size:13px}
  .hero{padding:8px 0 18px}
  .hero .logo{font-size:24px}
  .hero .logo .em{font-size:26px}
  .panel .pb{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:12.5px}
  th{padding:7px 8px;font-size:10px}
  td{padding:8px 8px}
  .hcard{padding:18px 14px}
  .hcard .ic{width:54px;height:54px;font-size:23px}
  .hcard h3{font-size:16px}
  .modal{width:100%}
  .modal .mb{padding:16px}
  .toolbar{gap:8px}
  .kpi{font-size:22px}
  .legend{font-size:11px;gap:10px}
  .login-card{padding:28px 22px}
}
</style>
</head>
<body>

<!-- ============ CARREGANDO ============ -->
<div id="boot" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6b7790;gap:10px">
  <img src="logo.png" alt="Ótica Carina" style="max-width:160px;width:55%;height:auto;opacity:.85" /><div style="font-size:14px">Carregando…</div>
</div>

<!-- ============ LOGIN ============ -->
<div id="login" style="display:none">
  <div class="login-card">
    <img src="logo.png" class="brandlogo" alt="Ótica Carina" />
    <h1>Escalas · Ótica Carina</h1>
    <p class="sub">Gestão de folgas, banco de horas e rodízio</p>
    <div id="loginErr"></div>
    <div class="field"><label>E-mail</label><input id="liEmail" type="email" placeholder="seu@email.com" autocomplete="username"/></div>
    <div class="field"><label>Senha</label><input id="liPass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" style="width:100%" id="liBtn">Entrar</button>
    <p class="sub" style="margin:16px 0 0">Primeiro acesso? <a href="#" id="liSignup">Criar conta</a></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header class="apphead">
    <div class="head-left">
      <button id="backBtn" class="backbtn hidden">← Início</button>
      <span class="pagetitle" id="pageTitle"></span>
    </div>
    <div class="head-right">
      <span>Olá, <b id="uName">—</b></span>
      <span id="uRole"></span>
      <button class="linkbtn" id="logoutBtn">⇥ Sair</button>
    </div>
  </header>
  <div id="simBanner"></div>
  <div class="content" id="view"></div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="./config.js"></script>
<script src="./engine.js"></script>
<script src="./app.js"></script>
</body>
</html>
